# light-cache 分布式演示:3 节点 etcd 集群 + 3 缓存节点 + 1 API 节点
#
# 启动:docker-compose up
# 测试:curl "http://localhost:9999/api?key=Tom"  → 630
#
# etcd 集群 3 节点 Raft,容忍挂 1 个,保证注册中心高可用。
# 缓存节点启动即注册自己到 etcd,互相 watch 发现,节点列表动态变化。

services:
  # ---- etcd 集群(3 节点,Raft)----
  etcd0:
    image: quay.io/coreos/etcd:v3.5.21
    # macOS gcr.io 拉不下来可换 quay.io/coreos/etcd:v3.5.21
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd0:2380
      - --initial-cluster=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=light-cache-etcd
    ports:
      - "2379:2379"   # 本机用 localhost:2379 访问

  etcd1:
    image: quay.io/coreos/etcd:v3.5.21
    command:
      - etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --initial-cluster=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=light-cache-etcd
    ports:
      - "22379:2379"

  etcd2:
    image: quay.io/coreos/etcd:v3.5.21
    command:
      - etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd2:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --initial-cluster=etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=light-cache-etcd
    ports:
      - "32379:2379"

  # ---- light-cache 对等节点(3 个)----
  # 每个节点对等:都注册 etcd 进环、都对外 /api + /_lightcache、都带 db 回源。
  # host 用容器名,保证其他节点能按 http://node1:8001 回连(PickPeer 排除自己靠地址一致)
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["-port=8001", "-host=node1", "-etcd=http://etcd0:2379,http://etcd1:2379,http://etcd2:2379"]
    ports:
      - "8001:8001"
    depends_on:
      etcd0:
        condition: service_started
      etcd1:
        condition: service_started
      etcd2:
        condition: service_started

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["-port=8002", "-host=node2", "-etcd=http://etcd0:2379,http://etcd1:2379,http://etcd2:2379"]
    ports:
      - "8002:8002"
    depends_on:
      etcd0:
        condition: service_started
      etcd1:
        condition: service_started
      etcd2:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["-port=9999", "-host=api", "-etcd=http://etcd0:2379,http://etcd1:2379,http://etcd2:2379"]
    ports:
      - "9999:9999"
    depends_on:
      etcd0:
        condition: service_started
      etcd1:
        condition: service_started
      etcd2:
        condition: service_started
